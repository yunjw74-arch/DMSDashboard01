<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Dashboard (Google Auth)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-ac.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .site-card:hover .delete-btn { opacity: 1; }
        .category-header:hover .edit-tools { opacity: 1; }
        .font-nanum-ac { font-family: 'NanumSquareAc', sans-serif; }
        .category-section { transition: all 0.2s ease; }
        .site-card { transition: transform 0.2s, background-color 0.2s; z-index: 1; }
        .site-card:hover { z-index: 50; } 
        .delete-btn { transition: opacity 0.2s; pointer-events: auto; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .sticky-active { border-bottom: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
    </style>
</head>
<body class="px-4 md:px-10 pb-20 relative font-nanum-ac text-black">

    <div class="max-w-[1600px] w-[98%] mx-auto">
        <!-- 상단 고정 영역 (헤더 + 카테고리 첫 줄) -->
        <div class="sticky top-0 z-40 bg-[#f8f9fa] pt-4 md:pt-8">
            <header class="pb-4 flex flex-col xl:flex-row items-center justify-between border-b border-gray-200 gap-4 mb-2">
                <!-- 검색 영역 -->
                <div class="flex flex-wrap justify-start items-center gap-3 w-full flex-1 ml-2">
                    <form action="https://search.naver.com/search.naver" method="get" target="_blank" class="flex items-center relative flex-1 min-w-[160px] max-w-[330px]" onsubmit="setTimeout(() => this.reset(), 100)">
                        <input type="text" name="query" placeholder="네이버 검색" class="pl-8 pr-3 py-1.5 border border-[#03c75a] rounded-full text-[13px] focus:outline-none focus:ring-2 focus:ring-[#03c75a]/30 w-full bg-gray-50 focus:bg-white transition-colors" autocomplete="off">
                        <i class="fas fa-search absolute left-3 text-[#03c75a] text-xs"></i>
                    </form>
                    <form action="https://www.google.com/search" method="get" target="_blank" class="flex items-center relative flex-1 min-w-[160px] max-w-[330px]" onsubmit="setTimeout(() => this.reset(), 100)">
                        <input type="text" name="q" placeholder="구글 검색" class="pl-8 pr-3 py-1.5 border border-[#4285f4] rounded-full text-[13px] focus:outline-none focus:ring-2 focus:ring-[#4285f4]/30 w-full bg-gray-50 focus:bg-white transition-colors" autocomplete="off">
                        <i class="fas fa-search absolute left-3 text-[#4285f4] text-xs"></i>
                    </form>
                </div>

                <!-- 우측 아이콘 및 프로필 영역 -->
                <div class="flex flex-wrap justify-start xl:justify-end items-center gap-2 w-full xl:w-auto shrink-0 mr-2 ml-2 xl:ml-0">
                    <form action="https://search.shopping.naver.com/search/all" method="get" target="_blank" class="flex items-center relative w-[130px] md:w-[165px]" onsubmit="setTimeout(() => this.reset(), 100)">
                        <input type="text" name="query" placeholder="네이버 최저가 검색" class="pl-8 pr-3 py-1.5 border border-[#03c75a] rounded-full text-[13px] text-[#03c75a] placeholder-[#03c75a]/70 focus:outline-none focus:ring-2 focus:ring-[#03c75a]/30 w-full bg-gray-50 transition-colors" autocomplete="off">
                        <i class="fas fa-shopping-cart absolute left-3 text-[#03c75a] text-xs"></i>
                    </form>

                    <form action="https://www.compuzone.co.kr/search/search.htm" method="get" target="_blank" class="flex items-center relative w-[130px] md:w-[165px]" onsubmit="setTimeout(() => this.reset(), 100)">
                        <input type="text" name="SearchProductKey" placeholder="컴퓨존 검색" class="pl-8 pr-3 py-1.5 border border-[#0a53a8] rounded-full text-[13px] text-[#0a53a8] placeholder-[#0a53a8]/70 focus:outline-none focus:ring-2 focus:ring-[#0a53a8]/30 w-full bg-gray-50 transition-colors" autocomplete="off">
                        <i class="fas fa-desktop absolute left-3 text-[#0a53a8] text-xs"></i>
                    </form>

                    <div class="w-px h-5 bg-gray-300 mx-1"></div>

                    <div id="fixed-header-icons" class="flex items-center gap-2">
                        <a href="https://gemini.google.com/" target="_blank" title="제미나이" class="bg-white hover:bg-gray-50 transition w-8 h-8 rounded-full border border-gray-200 shadow-sm flex items-center justify-center group">
                            <svg class="w-4 h-4 text-[#8b5cf6]" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C12 6.627 17.373 12 24 12C17.373 12 12 17.373 12 24C12 17.373 6.627 12 0 12C6.627 12 12 6.627 12 0Z" /></svg>
                        </a>
                        <a href="https://notebooklm.google.com/" target="_blank" title="노트북LM" class="bg-white hover:bg-gray-50 transition w-8 h-8 rounded-full border border-gray-200 shadow-sm flex items-center justify-center group overflow-hidden">
                            <div class="w-5 h-5 bg-[#1e293b] rounded-full flex items-center justify-center group-hover:scale-105 transition-transform">
                                <svg class="w-3.5 h-3.5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 22v-6a8 8 0 0 1 16 0v6" />
                                    <path d="M8 22v-3a4 4 0 0 1 8 0v3" />
                                    <path d="M12 22v-1" />
                                </svg>
                            </div>
                        </a>
                        <a href="https://naver.com/" target="_blank" title="네이버" class="bg-white hover:bg-gray-50 transition w-8 h-8 rounded-full border border-gray-200 shadow-sm flex items-center justify-center group">
                            <span class="text-[#03c75a] font-extrabold text-[13px]">N</span>
                        </a>
                    </div>

                    <div class="w-px h-5 bg-gray-300 mx-1"></div>

                    <button id="login-btn" onclick="loginWithGoogle()" class="flex items-center gap-2 bg-white hover:bg-blue-50 border border-gray-200 shadow-sm px-3 py-1.5 rounded-full transition-colors group">
                        <img src="https://www.google.com/favicon.ico" alt="Google" class="w-3.5 h-3.5">
                        <span class="text-[11px] font-bold text-gray-600 group-hover:text-blue-600">구글 로그인</span>
                    </button>

                    <div id="user-profile-area" class="hidden flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-gray-200 shadow-sm">
                        <img id="user-avatar" src="" class="w-5 h-5 rounded-full hidden" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
                        <i id="user-avatar-fallback" class="fas fa-user-circle text-gray-400 text-lg hidden"></i>
                        <span id="user-display-name" class="text-[11px] font-bold text-gray-700 truncate max-w-[100px]"></span>
                        <button onclick="logout()" title="로그아웃" class="ml-1 text-gray-400 hover:text-red-500 transition-colors">
                            <i class="fas fa-sign-out-alt text-xs"></i>
                        </button>
                    </div>

                    <button type="button" onclick="addCategory()" title="카테고리 추가" class="bg-white hover:bg-blue-50 border-gray-200 w-8 h-8 rounded-full border shadow-sm flex items-center justify-center group">
                        <i class="fas fa-folder-plus text-blue-500 text-xs"></i>
                    </button>
                </div>
            </header>

            <div id="sticky-dashboard" class="grid grid-cols-1 lg:grid-cols-2 gap-1.5 items-start mb-2">
                <!-- 고정 카테고리 영역 -->
            </div>
        </div>

        <div id="dashboard" class="grid grid-cols-1 lg:grid-cols-2 gap-1.5 items-start mt-2">
            <!-- 일반 카테고리 영역 -->
        </div>

        <!-- 하단 섹션 -->
        <div class="mt-5 border-t border-gray-200 pt-8 pb-20">
            <div class="w-full flex flex-col md:flex-row items-center mb-6 gap-4">
                <div class="flex items-center gap-3 shrink-0">
                    <a href="https://calendar.google.com/" target="_blank" title="구글 캘린더 새 창에서 열기" class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm border border-gray-100 hover:bg-blue-50 transition-colors cursor-pointer group">
                        <i class="fas fa-calendar-alt text-blue-500 group-hover:scale-110 transition-transform"></i>
                    </a>
                    <button type="button" onclick="openCalendarSettings()" class="text-lg font-bold text-gray-800 hover:text-blue-600 transition-colors" title="캘린더 연동 설정">업무 일정</button>
                </div>
                
                <div id="exchange-rate-display" class="flex-1 flex justify-end items-center px-2 gap-2">
                    <span class="text-[11px] text-gray-400 flex items-center gap-2">
                        <i class="fas fa-circle-notch fa-spin"></i> 환율 정보 로딩중...
                    </span>
                </div>

                <a href="https://calendar.kakao.com" target="_blank" class="flex items-center gap-2 bg-[#FEE500] hover:bg-[#FDD800] text-[#000000] px-4 py-2.5 rounded-lg font-bold text-[13px] shadow-sm transition-colors shrink-0">
                    <i class="fas fa-calendar-plus"></i> 카카오 일정
                </a>
            </div>
            
            <div class="flex flex-col lg:flex-row gap-6 h-[600px]">
                <div id="calendar-container-month" class="w-full lg:w-[70%] bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden h-full">
                    <iframe id="calendar-iframe-month" src="" style="border: 0" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
                </div>
                <div class="w-full lg:w-[30%] flex flex-col h-full">
                    <div class="flex-1 bg-white rounded-2xl border border-gray-200 shadow-sm flex flex-col overflow-hidden h-full">
                        <div class="p-3.5 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                            <h4 class="font-bold text-gray-700 text-sm flex items-center gap-2"><i class="fas fa-check-square text-blue-500"></i> 할일 & 메모</h4>
                            <span id="todo-count" class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-bold">0/0</span>
                        </div>
                        <div class="p-2.5 border-b border-gray-100">
                            <div class="flex gap-2">
                                <input type="text" id="todoInput" placeholder="입력 후 Enter..." class="flex-1 p-2 bg-gray-50 border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <button id="addTodoBtn" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[11px] font-bold hover:bg-blue-700 transition-colors shrink-0">추가</button>
                            </div>
                        </div>
                        <div class="p-2 flex-1 overflow-y-auto bg-white">
                            <ul id="todoList" class="space-y-1"></ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 하단 도구 모음 영역 -->
            <div class="mt-6 flex flex-col gap-4">
                <!-- 1. 수입 원가 계산기 -->
                <div class="bg-white rounded-2xl border border-gray-200 shadow-sm px-5 py-3 overflow-x-auto w-full xl:w-max">
                    <div class="flex flex-wrap items-center justify-start gap-2 md:gap-4 w-max mx-auto xl:mx-0">
                        <div class="flex flex-col">
                            <label class="text-[9px] text-gray-500 mb-0.5 ml-1 font-bold">달러 가격 (USD)</label>
                            <div class="relative">
                                <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400 text-[11px]">$</span>
                                <input type="number" id="calc-price" class="w-20 md:w-28 pl-6 pr-2 py-1.5 bg-gray-50 border border-gray-200 rounded-lg text-xs font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="0" oninput="calculateTotal()">
                            </div>
                        </div>
                        <span class="text-gray-400 mt-3 font-bold text-xs">+</span>
                        <div class="flex flex-col">
                            <label class="text-[9px] text-gray-500 mb-0.5 ml-1 font-bold">배송비 (USD)</label>
                            <div class="relative">
                                <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400 text-[11px]">$</span>
                                <input type="number" id="calc-shipping" class="w-20 md:w-28 pl-6 pr-2 py-1.5 bg-gray-50 border border-gray-200 rounded-lg text-xs font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="0" oninput="calculateTotal()">
                            </div>
                        </div>
                        <span class="text-gray-400 mt-3 font-bold text-xs">×</span>
                        <div class="flex flex-col items-center">
                            <label class="text-[9px] text-gray-500 mb-0.5 font-bold">관세</label>
                            <div class="w-12 py-1.5 bg-gray-100 border border-gray-200 rounded-lg text-xs text-center text-gray-500 font-bold">1.08</div>
                        </div>
                        <span class="text-gray-400 mt-3 font-bold text-xs">×</span>
                        <div class="flex flex-col items-center">
                            <label class="text-[9px] text-gray-500 mb-0.5 font-bold">송금 환율</label>
                            <input type="number" step="0.01" id="calc-rate-input" class="w-24 px-2 py-1.5 bg-green-50 border border-green-200 rounded-lg text-xs text-center text-green-700 font-bold focus:ring-2 focus:ring-green-500 outline-none transition-all" placeholder="0" oninput="calculateTotal()">
                        </div>
                        <span class="text-gray-400 mt-3 font-bold text-sm">=</span>
                        <div class="flex flex-col items-start min-w-[180px]">
                            <label class="text-[9px] text-gray-500 mb-0.5 ml-1 font-bold">최종 예상 금액 (KRW)</label>
                            <div class="flex items-center gap-2 w-full">
                                <div id="calc-total-display" class="flex-1 px-3 py-1.5 bg-blue-50 border border-blue-200 rounded-lg text-sm md:text-base text-right text-blue-700 font-extrabold truncate">0 원</div>
                                <a href="https://finance.naver.com/marketindex/exchangeDetail.naver?marketindexCd=FX_USDKRW" target="_blank" class="w-8 h-8 flex items-center justify-center bg-white border border-gray-200 rounded-lg shadow-sm hover:bg-gray-50 transition-colors shrink-0">
                                    <span class="text-[#03c75a] font-extrabold text-[12px]">N</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- FedEx 시뮬레이터 -->
                <div class="bg-white rounded-2xl border border-gray-200 shadow-sm px-5 py-3 w-full">
                    <div class="flex items-center justify-between mb-2 pb-1 border-b border-gray-50">
                        <div class="flex items-center gap-2">
                            <div class="w-7 h-7 bg-[#4D148C] rounded-lg flex items-center justify-center text-white text-xs shadow-sm">
                                <i class="fas fa-shipping-fast"></i>
                            </div>
                            <h3 class="text-[12px] font-extrabold text-gray-800">특송 운임 시뮬레이터</h3>
                            <span class="text-[9px] text-gray-400 font-bold ml-2">인도 찬디가르 ➔ 서울 가산동</span>
                        </div>
                        <div class="text-[9px] font-bold text-gray-500">(L × W × H cm) ÷ 5,000</div>
                    </div>
                    <div class="grid grid-cols-1 xl:grid-cols-12 gap-3 items-center">
                        <div class="xl:col-span-8 flex flex-wrap items-center gap-3">
                            <div class="flex items-center gap-1.5">
                                <span class="text-[10px] font-bold text-gray-400">L</span>
                                <input type="number" id="fedex-l" class="w-16 px-2 py-1 bg-gray-50 border border-gray-200 rounded-lg text-xs font-bold outline-none" placeholder="0" oninput="calculateFedEx()">
                            </div>
                            <div class="flex items-center gap-1.5">
                                <span class="text-[10px] font-bold text-gray-400">W</span>
                                <input type="number" id="fedex-w" class="w-16 px-2 py-1 bg-gray-50 border border-gray-200 rounded-lg text-xs font-bold outline-none" placeholder="0" oninput="calculateFedEx()">
                            </div>
                            <div class="flex items-center gap-1.5">
                                <span class="text-[10px] font-bold text-gray-400">H</span>
                                <input type="number" id="fedex-h" class="w-16 px-2 py-1 bg-gray-50 border border-gray-200 rounded-lg text-xs font-bold outline-none" placeholder="0" oninput="calculateFedEx()">
                            </div>
                            <div class="w-px h-4 bg-gray-200 hidden md:block mx-1"></div>
                            <div class="flex items-center gap-2">
                                <label class="text-[10px] font-extrabold text-blue-600">실 중량(kg)</label>
                                <input type="number" id="fedex-weight" class="w-20 px-2 py-1 bg-blue-50 border border-blue-200 rounded-lg text-xs font-bold text-blue-700 outline-none" placeholder="0" oninput="calculateFedEx()">
                            </div>
                        </div>
                        <div class="xl:col-span-4 flex items-center justify-between bg-gray-50/50 rounded-lg border border-dashed border-gray-200 px-3 py-1.5 gap-4">
                            <div class="flex items-center gap-4">
                                <div class="flex flex-col">
                                    <span class="text-[9px] text-gray-400 font-bold">용적중량</span>
                                    <span id="fedex-dim-wt-display" class="text-[11px] font-extrabold text-gray-600">0.00 kg</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[9px] text-gray-400 font-bold">청구중량</span>
                                    <span id="fedex-charge-wt" class="text-[11px] font-extrabold text-red-500">0.00 kg</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <div id="fedex-usd" class="text-sm font-black text-[#4D148C]">$ 0.00</div>
                                <div id="fedex-krw" class="text-[10px] font-bold text-gray-500">≈ 0 원</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="siteModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 backdrop-blur-sm transition-opacity text-black p-4">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm border">
            <h3 id="modalTitle" class="text-base font-bold text-gray-800 mb-5">바로가기 추가</h3>
            <input type="hidden" id="modalCategory">
            <div class="space-y-4">
                <input type="text" id="siteName" placeholder="이름" class="w-full p-2.5 border rounded-lg bg-gray-50 text-sm">
                <input type="text" id="siteUrl" placeholder="URL" class="w-full p-2.5 border rounded-lg bg-gray-50 text-sm">
                <input type="text" id="siteDesc" placeholder="설명 (선택)" class="w-full p-2.5 border rounded-lg bg-gray-50 text-sm">
            </div>
            <div class="flex justify-end gap-2 mt-8">
                <button id="closeModalBtn" class="px-4 py-2 text-gray-600 text-sm hover:bg-gray-100 rounded-lg">취소</button>
                <button id="submitSiteBtn" class="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg text-sm hover:bg-blue-700">저장</button>
            </div>
        </div>
    </div>

    <div id="calendarModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 backdrop-blur-sm p-4 text-black">
        <div class="bg-white p-7 rounded-2xl shadow-xl w-full max-w-md border">
            <h3 class="text-base font-bold text-gray-800 mb-4">업무 일정 설정</h3>
            <input type="text" id="calendarSrcInput" placeholder="Google 캘린더 ID 입력" class="w-full p-2.5 mb-6 border rounded-lg bg-gray-50 text-sm">
            <div class="flex justify-end gap-2">
                <button id="closeCalendarModalBtn" class="px-4 py-2 text-gray-600 text-sm hover:bg-gray-100 rounded-lg">닫기</button>
                <button id="saveCalendarSettingsBtn" class="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg text-sm hover:bg-blue-700">저장</button>
            </div>
        </div>
    </div>

    <div id="editTodoModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 backdrop-blur-sm p-4 text-black">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md border">
            <h3 class="text-base font-bold text-gray-800 mb-5">수정하기</h3>
            <textarea id="editTodoInput" rows="8" class="w-full p-3 border rounded-lg bg-gray-50 text-sm outline-none"></textarea>
            <div class="flex justify-end gap-2 mt-6">
                <button id="closeEditTodoModalBtn" class="px-4 py-2 text-gray-600 text-sm hover:bg-gray-100 rounded-lg">취소</button>
                <button id="saveEditTodoBtn" class="px-4 py-2 bg-blue-600 text-white font-bold rounded-lg text-sm hover:bg-blue-700">확인</button>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-[100] text-xs font-bold opacity-0 transition-opacity duration-300"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAI9RHb4fuk8RmvlhcRtQjqzm_wKbG42k",
            authDomain: "webdashboard-d9db7.firebaseapp.com",
            projectId: "webdashboard-d9db7",
            storageBucket: "webdashboard-d9db7.firebasestorage.app",
            messagingSenderId: "536804719990",
            appId: "1:536804719990:web:7317ae2e35be87addd0e57"
        };
        const appId = 'webdashboard';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let sites = [];
        let categories = [];
        let calendarId = "ko.south_korea#holiday@group.v.calendar.google.com";
        let todos = [];
        let currentUser = null;
        let currentEditTodoIndex = -1;
        let unsubs = [];

        const getUserRoot = (uid) => `artifacts/${appId}/users/${uid}`;
        const getConfigDoc = (uid) => doc(db, getUserRoot(uid), 'config', 'settings');
        const getSitesCol = (uid) => collection(db, getUserRoot(uid), 'sites');
        const getTodosCol = (uid) => collection(db, getUserRoot(uid), 'todos');

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('opacity-100'), 10);
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 2000);
        };

        window.updateCalendarIframe = () => {
            const iframe = document.getElementById('calendar-iframe-month');
            if (iframe) {
                const baseSrc = `src=${encodeURIComponent(calendarId)}&ctz=Asia%2FSeoul&bgcolor=%23ffffff`;
                iframe.src = `https://calendar.google.com/calendar/embed?${baseSrc}&showTitle=0&showNav=1&showPrint=0&showTabs=1&showCalendars=0&showTz=0&mode=MONTH&wkst=1`;
            }
        };

        const requireAuth = () => {
            if (!currentUser) { showToast('회원 로그인이 필요한 기능입니다.'); return false; }
            return true;
        };

        const loadDemoData = () => {
            categories = ['기본 카테고리', '도구 모음'];
            sites = [
                { id: 'demo1', name: '네이버', url: 'https://naver.com', category: '기본 카테고리' },
                { id: 'demo2', name: '유튜브', url: 'https://youtube.com', category: '기본 카테고리' }
            ];
            todos = [{ id: 't1', text: '[안내] 우측 상단의 [구글 로그인] 버튼을 눌러 회원가입을 진행해주세요.', done: false, createdAt: 1 }];
            render();
            renderTodos();
            updateCalendarIframe();
        };

        window.loginWithGoogle = async () => {
            try { await signInWithPopup(auth, provider); } 
            catch (error) { showToast('로그인 처리 중 오류가 발생했습니다.'); }
        };

        window.logout = async () => { try { await signOut(auth); showToast('로그아웃 되었습니다.'); } catch (error) {} };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const loginBtn = document.getElementById('login-btn');
            const profileArea = document.getElementById('user-profile-area');
            const displayNameElem = document.getElementById('user-display-name');
            const avatarElem = document.getElementById('user-avatar');
            const avatarFallback = document.getElementById('user-avatar-fallback');

            if (user && !user.isAnonymous) {
                loginBtn.classList.add('hidden'); profileArea.classList.remove('hidden');
                displayNameElem.innerText = user.displayName || user.email.split('@')[0];
                if (user.photoURL) { avatarElem.src = user.photoURL; avatarElem.style.display = 'block'; avatarFallback.style.display = 'none'; }
                else { avatarElem.style.display = 'none'; avatarFallback.style.display = 'inline-block'; }
                startListeners(user.uid);
                showToast(`환영합니다, ${displayNameElem.innerText}님!`);
            } else {
                loginBtn.classList.remove('hidden'); profileArea.classList.add('hidden');
                unsubs.forEach(u => u()); unsubs = [];
                loadDemoData();
            }
        });

        function startListeners(uid) {
            unsubs.forEach(u => u());
            unsubs = [];
            unsubs.push(onSnapshot(getConfigDoc(uid), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.categories) categories = data.categories;
                    if (data.calendarId) { calendarId = data.calendarId; updateCalendarIframe(); }
                    render();
                } else {
                    setDoc(getConfigDoc(uid), { categories: ['기본 그룹', '업무용'], calendarId: "ko.south_korea#holiday@group.v.calendar.google.com" });
                }
            }));
            unsubs.push(onSnapshot(getSitesCol(uid), (snap) => { sites = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); render(); }));
            unsubs.push(onSnapshot(getTodosCol(uid), (snap) => { todos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); todos.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)); renderTodos(); }));
        }

        // --- Drag & Drop for Categories (이동 기능) ---
        let dragIdx = -1;
        window.handleDragStart = (e, idx) => { 
            if (!requireAuth()) { e.preventDefault(); return; }
            dragIdx = idx; e.target.classList.add('opacity-40'); 
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('application/category', 'true');
        };
        window.handleDragEnd = (e) => { e.target.classList.remove('opacity-40'); };
        window.handleDrop = async (e, dropIdx) => {
            e.preventDefault();
            if (!e.dataTransfer.types.includes('application/category')) return;
            if(dragIdx !== dropIdx && dragIdx !== -1 && currentUser) {
                const moved = categories.splice(dragIdx, 1)[0];
                categories.splice(dropIdx, 0, moved);
                await setDoc(getConfigDoc(currentUser.uid), { categories, calendarId }, { merge: true });
            }
        };

        // --- Core Business Logic ---
        window.calculateFedEx = () => {
            const L = parseFloat(document.getElementById('fedex-l').value) || 0;
            const W = parseFloat(document.getElementById('fedex-w').value) || 0;
            const H = parseFloat(document.getElementById('fedex-h').value) || 0;
            const actualWt = parseFloat(document.getElementById('fedex-weight').value) || 0;
            const dimWt = (L * W * H) / 5000;
            const chargeWt = Math.max(dimWt, actualWt);
            const totalUSD = chargeWt * 12.5 * 1.28;
            document.getElementById('fedex-dim-wt-display').innerText = dimWt.toFixed(2) + ' kg';
            document.getElementById('fedex-charge-wt').innerText = chargeWt.toFixed(2) + ' kg';
            document.getElementById('fedex-usd').innerText = '$ ' + totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            const currentRate = parseFloat(document.getElementById('calc-rate-input').value) || 0;
            document.getElementById('fedex-krw').innerText = '≈ ' + Math.round(totalUSD * currentRate).toLocaleString('ko-KR') + ' 원';
        };

        window.calculateTotal = () => {
            const price = parseFloat(document.getElementById('calc-price').value) || 0;
            const shipping = parseFloat(document.getElementById('calc-shipping').value) || 0;
            const currentRate = parseFloat(document.getElementById('calc-rate-input').value) || 0;
            const total = (price + shipping) * 1.08 * currentRate;
            document.getElementById('calc-total-display').innerText = Math.round(total).toLocaleString('ko-KR') + ' 원';
            window.calculateFedEx();
        };

        window.fetchExchangeRate = async (isManual = false) => {
            const displayElement = document.getElementById('exchange-rate-display');
            const refreshBtn = document.getElementById('rate-refresh-btn');
            if (refreshBtn && isManual) refreshBtn.querySelector('i').classList.add('fa-spin');
            try {
                const res = await fetch('https://api.manana.kr/exchange/rate.json');
                const data = await res.json();
                const usdData = data.find(d => d.name === 'USDKRW=X');
                if (usdData) {
                    const sendRate = usdData.rate + 9.8;
                    displayElement.innerHTML = `<a href="https://finance.naver.com/marketindex/exchangeDetail.naver?marketindexCd=FX_USDKRW" target="_blank" class="flex items-center gap-2 text-[12px] font-bold text-gray-700 bg-green-50 px-3 py-1.5 rounded-lg border border-green-200 shadow-sm cursor-pointer transition-all hover:bg-green-100">
                        <span class="flex items-center justify-center w-5 h-5 bg-white rounded-full text-green-600 shadow-sm"><i class="fas fa-dollar-sign text-[10px]"></i></span>
                        <span>1 USD = <span class="text-red-500">${sendRate.toLocaleString('ko-KR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span> 원</span>
                        <span class="text-[10px] text-gray-500 font-normal ml-1 bg-white px-1.5 py-0.5 rounded border border-gray-200">송금 보낼때</span>
                    </a><button id="rate-refresh-btn" onclick="window.fetchExchangeRate(true)" class="w-8 h-8 flex items-center justify-center bg-white border border-gray-200 rounded-full shadow-sm text-gray-400 hover:text-blue-600 hover:bg-blue-50 transition-colors"><i class="fas fa-sync-alt text-xs"></i></button>`;
                    const calcRateInput = document.getElementById('calc-rate-input');
                    if (calcRateInput) { calcRateInput.value = sendRate.toFixed(2); window.calculateTotal(); }
                }
            } catch (e) {}
        };

        // --- Category/Site Management ---
        window.addCategory = async () => {
            if (!requireAuth()) return;
            const name = prompt('새 카테고리 이름을 입력하세요:');
            if (name && name.trim()) { categories.push(name.trim()); await setDoc(getConfigDoc(currentUser.uid), { categories, calendarId }, { merge: true }); }
        };
        window.renameCategory = async (oldName) => {
            if (!requireAuth()) return;
            const newName = prompt(`'${oldName}' 카테고리 이름 변경:`, oldName);
            if (newName && newName.trim() && newName.trim() !== oldName) { const idx = categories.indexOf(oldName); if (idx !== -1) { categories[idx] = newName.trim(); await setDoc(getConfigDoc(currentUser.uid), { categories, calendarId }, { merge: true }); const batchPromises = sites.filter(s => s.category === oldName).map(s => updateDoc(doc(getSitesCol(currentUser.uid), s.id), { category: newName.trim() })); await Promise.all(batchPromises); } }
        };
        window.deleteCategory = async (catName) => {
            if (!requireAuth()) return;
            if (confirm(`'${catName}' 카테고리를 삭제하시겠습니까?`)) { const newCats = categories.filter(c => c !== catName); await setDoc(getConfigDoc(currentUser.uid), { categories: newCats, calendarId }, { merge: true }); const deletions = sites.filter(s => s.category === catName).map(s => deleteDoc(doc(getSitesCol(currentUser.uid), s.id))); await Promise.all(deletions); }
        };
        window.submitSite = async () => {
            if (!requireAuth()) { closeModal(); return; }
            const name = document.getElementById('siteName').value.trim();
            let url = document.getElementById('siteUrl').value.trim();
            const cat = document.getElementById('modalCategory').value;
            if (!name || !url) return showToast('이름과 URL을 입력해주세요.');
            if (!url.startsWith('http')) url = 'https://' + url;
            const maxOrder = sites.filter(s => s.category === cat).length;
            await setDoc(doc(getSitesCol(currentUser.uid)), { name, url, category: cat, createdAt: Date.now(), order: maxOrder + 1 });
            closeModal(); showToast('추가되었습니다.');
        };
        window.deleteSite = async (docId) => { if (!requireAuth()) return; if (confirm('삭제하시겠습니까?')) { await deleteDoc(doc(getSitesCol(currentUser.uid), docId)); showToast('삭제되었습니다.'); } };
        
        // --- Rendering ---
        function render() {
            const stickyDashboard = document.getElementById('sticky-dashboard');
            const mainDashboard = document.getElementById('dashboard');
            stickyDashboard.innerHTML = ''; mainDashboard.innerHTML = '';
            if (!categories || categories.length === 0) return;

            categories.forEach((cat, cIdx) => {
                const section = document.createElement('div');
                section.className = 'category-section bg-white border border-gray-200 border-b-[4px] border-b-gray-300 shadow-md px-5 py-2.5 rounded-2xl flex flex-col h-full cursor-default';
                section.draggable = !!currentUser;
                section.addEventListener('dragstart', (e) => window.handleDragStart(e, cIdx));
                section.addEventListener('dragend', window.handleDragEnd);
                section.addEventListener('dragover', (e) => e.preventDefault());
                section.addEventListener('drop', (e) => window.handleDrop(e, cIdx));

                const catSites = sites.filter(s => s.category === cat).sort((a, b) => (a.order || 0) - (b.order || 0));
                
                // 아이콘 크기를 기존 w-6 h-6에서 w-8 h-8로 약 30% 확대
                const sitesHtml = catSites.map(site => `
                    <div class="site-card relative flex flex-col items-center group p-1 cursor-grab transition-all">
                        <button onclick="deleteSite('${site.id}')" class="delete-btn opacity-0 absolute -top-0.5 right-0.5 bg-red-500 text-white w-3.5 h-3.5 rounded-full text-[7px] flex items-center justify-center hover:bg-red-600 shadow-sm z-10 transition-opacity"><i class="fas fa-times"></i></button>
                        <a href="${site.url}" target="_blank" class="flex flex-col items-center text-center w-full">
                            <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center border border-gray-100 mb-1 overflow-hidden p-1 shadow-sm transition-transform group-hover:scale-105">
                                <img src="https://www.google.com/s2/favicons?sz=64&domain=${site.url}" class="w-full h-full object-contain" onerror="this.src='https://www.google.com/favicon.ico'">
                            </div>
                            <span class="text-[10px] font-medium text-gray-700 truncate w-full px-0.5 leading-tight">${site.name}</span>
                        </a>
                    </div>`).join('');
                
                section.innerHTML = `
                    <div class="flex items-center mb-0 group">
                        <h2 class="text-xs font-bold text-gray-700 border-l-[2px] border-blue-500 pl-1.5 flex items-center gap-1 mr-2"><i class="fas fa-folder text-blue-400"></i> ${cat}</h2>
                        <div class="opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-0.5 ml-auto">
                            <button onclick="renameCategory('${cat}')" class="text-gray-400 hover:text-blue-500 w-5 h-5 flex items-center justify-center rounded"><i class="fas fa-pen text-[9px]"></i></button>
                            <button onclick="deleteCategory('${cat}')" class="text-gray-400 hover:text-red-500 w-5 h-5 flex items-center justify-center rounded"><i class="fas fa-trash text-[9px]"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-5 sm:grid-cols-7 md:grid-cols-9 lg:grid-cols-11 gap-0.5 items-start min-h-[45px]">
                        ${sitesHtml}
                        <div class="flex flex-col items-center group cursor-pointer p-1" onclick="openQuickAddModal('${cat}')">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center border border-dashed border-gray-300 mb-1 hover:border-blue-500 hover:bg-blue-50 transition-all">
                                <i class="fas fa-plus text-gray-300 group-hover:text-blue-500 text-[10px]"></i>
                            </div>
                        </div>
                    </div>`;

                if (cIdx < 2) { stickyDashboard.appendChild(section); } else { mainDashboard.appendChild(section); }
            });
        }

        // --- Todos ---
        window.addTodo = async () => {
            if (!requireAuth()) return;
            const input = document.getElementById('todoInput');
            if (input.value.trim()) { const now = new Date(); const prefix = `[${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}] `; await setDoc(doc(getTodosCol(currentUser.uid)), { text: prefix + input.value.trim(), done: false, createdAt: Date.now() }); input.value = ''; }
        };
        window.toggleTodo = async (id, done) => { if (!requireAuth()) return; await updateDoc(doc(getTodosCol(currentUser.uid), id), { done: !done }); };
        window.deleteTodo = async (id) => { if (!requireAuth()) return; await deleteDoc(doc(getTodosCol(currentUser.uid), id)); };
        function renderTodos() {
            const list = document.getElementById('todoList'); if (!list) return;
            document.getElementById('todo-count').innerText = `${todos.filter(t => t.done).length}/${todos.length}`;
            list.innerHTML = todos.length === 0 ? '<li class="text-xs text-gray-400 text-center py-4">할일이 없습니다.</li>' : todos.map((t, i) => `<li class="flex items-start justify-between group p-1.5 hover:bg-gray-50 rounded-lg transition-colors border border-transparent"><div class="flex items-start gap-2 overflow-hidden cursor-pointer flex-1" onclick="toggleTodo('${t.id}', ${t.done})"><div class="w-3.5 h-3.5 mt-0.5 shrink-0 rounded border flex items-center justify-center ${t.done ? 'bg-blue-500 border-blue-500 text-white' : 'border-gray-300 text-transparent'}"><i class="fas fa-check text-[7px]"></i></div><span class="text-[11px] break-words whitespace-pre-wrap ${t.done ? 'text-gray-400 line-through' : 'text-gray-700'} flex-1 leading-normal">${t.text}</span></div><div class="opacity-0 group-hover:opacity-100 flex items-center gap-1 shrink-0 ml-1"><button onclick="editTodo(${i})" class="text-gray-400 hover:text-blue-500 p-1"><i class="fas fa-pen text-[9px]"></i></button><button onclick="deleteTodo('${t.id}')" class="text-gray-400 hover:text-red-500 p-1"><i class="fas fa-times text-[9px]"></i></button></div></li>`).join('');
        }

        window.closeModal = () => document.getElementById('siteModal').classList.add('hidden');
        window.openQuickAddModal = (cat) => { if (!requireAuth()) return; document.getElementById('modalCategory').value = cat; document.getElementById('modalTitle').innerText = `'${cat}' 바로가기 추가`; document.getElementById('siteName').value = ""; document.getElementById('siteUrl').value = ""; document.getElementById('siteModal').classList.remove('hidden'); };
        window.openCalendarSettings = () => { if (!requireAuth()) return; document.getElementById('calendarSrcInput').value = calendarId; document.getElementById('calendarModal').classList.remove('hidden'); };
        window.closeCalendarModal = () => document.getElementById('calendarModal').classList.add('hidden');
        window.editTodo = (idx) => { if (!requireAuth()) return; currentEditTodoIndex = idx; document.getElementById('editTodoInput').value = todos[idx].text; document.getElementById('editTodoModal').classList.remove('hidden'); };
        window.closeEditTodoModal = () => document.getElementById('editTodoModal').classList.add('hidden');
        window.saveEditTodo = async () => { if (!requireAuth() || currentEditTodoIndex === -1) return; const newText = document.getElementById('editTodoInput').value.trim(); if (newText) { await updateDoc(doc(getTodosCol(currentUser.uid), todos[currentEditTodoIndex].id), { text: newText }); closeEditTodoModal(); showToast('수정되었습니다.'); } };
        window.saveCalendarSettings = async () => { if (!requireAuth()) { closeCalendarModal(); return; } const val = document.getElementById('calendarSrcInput').value.trim(); if (val) { await setDoc(getConfigDoc(currentUser.uid), { calendarId: val }, { merge: true }); closeCalendarModal(); showToast('저장되었습니다.'); } };

        document.getElementById('addTodoBtn').onclick = window.addTodo;
        document.getElementById('todoInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') window.addTodo(); });
        document.getElementById('closeModalBtn').onclick = window.closeModal;
        document.getElementById('submitSiteBtn').onclick = window.submitSite;
        document.getElementById('closeCalendarModalBtn').onclick = window.closeCalendarModal;
        document.getElementById('saveCalendarSettingsBtn').onclick = window.saveCalendarSettings;
        document.getElementById('closeEditTodoModalBtn').onclick = window.closeEditTodoModal;
        document.getElementById('saveEditTodoBtn').onclick = window.saveEditTodo;

        window.fetchExchangeRate();
        setInterval(() => window.fetchExchangeRate(false), 60000);
    </script>
</body>
</html>
