<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Dashboard (AI Enhanced)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-ac.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; position: relative; min-height: 100vh; overflow-x: hidden; }
        .site-card:hover .delete-btn { opacity: 1; }
        .my-site-item:hover .my-delete-btn { opacity: 1; }
        .category-header:hover .edit-tools { opacity: 1; }
        .font-nanum-ac { font-family: 'NanumSquareAc', sans-serif; }
        .category-section { transition: all 0.2s ease; }
        .site-card { transition: transform 0.2s, background-color 0.2s; z-index: 1; }
        .site-card:hover { z-index: 50; } 
        .delete-btn, .my-delete-btn { transition: opacity 0.2s; pointer-events: auto; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Sticky Note Styles */
        .sticky-note {
            position: fixed;
            box-shadow: 3px 3px 12px rgba(0,0,0,0.18);
            border-radius: 4px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.08);
            resize: both;
            min-width: 150px;
            min-height: 150px;
            background-color: #fff9c4;
        }
        body.dragging-active {
            user-select: none !important;
            -webkit-user-select: none !important;
        }
        .sticky-note-header {
            cursor: move;
            height: 30px;
            background: rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }
        .sticky-note-body {
            flex: 1;
            padding: 10px 12px 12px 12px;
            font-family: 'NanumSquareAc', sans-serif;
            font-size: 14px;
            border: none;
            background: transparent;
            resize: none;
            outline: none;
            line-height: 1.6;
            width: 100%;
            margin-top: 0;
        }
        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 2px rgba(0,0,0,0.2);
            transition: transform 0.15s;
        }
        .color-dot:hover { transform: scale(1.3); }
        .note-date {
            font-size: 10px;
            font-weight: 800;
            color: rgba(0,0,0,0.4);
            margin-right: auto;
            margin-left: 8px;
            pointer-events: none;
        }
        
        .my-site-item { cursor: grab; }
        .my-site-item:active { cursor: grabbing; }
        .tool-module { transition: all 0.3s ease; }
    </style>
</head>
<body class="px-4 md:px-10 pb-20 font-nanum-ac text-black">

    <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800/90 text-white px-6 py-3 rounded-full shadow-2xl z-[3000] text-xs font-bold opacity-0 transition-opacity duration-300"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAI9RHb4fuk8RmvlhcRtQjqzm_wKbG42k",
            authDomain: "webdashboard-d9db7.firebaseapp.com",
            projectId: "webdashboard-d9db7",
            storageBucket: "webdashboard-d9db7.firebasestorage.app",
            messagingSenderId: "536804719990",
            appId: "1:536804719990:web:7317ae2e35be87addd0e57"
        };
        const appId = 'webdashboard';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // --- Core Variables ---
        let currentUser = null;
        let sites = [], categories = [], mySites = [], todos = [], stickyNotes = [], unsubs = [];
        let calendarId = "ko.south_korea#holiday@group.v.calendar.google.com";
        let toolsVisibility = { showCalculator: false, showFedEx: false, showLedCalc: false };
        let activeDragId = null, dragStartPos = { x: 0, y: 0 }, noteStartPos = { x: 0, y: 0 }, dragMyIdx = -1;

        const getUserRoot = (uid) => `/artifacts/${appId}/users/${uid}`;

        // --- GLOBAL FUNCTIONS - DEFINED EARLY FOR RELIABILITY ---
        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.innerText = msg; toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('opacity-100'), 10);
            setTimeout(() => { toast.classList.remove('opacity-100'); setTimeout(() => toast.classList.add('hidden'), 300); }, 2000);
        };

        window.requireAuth = () => {
            if (!currentUser) {
                window.showToast('로그인이 필요한 기능입니다.');
                return false;
            }
            return true;
        };

        window.loginWithGoogle = async () => { try { await signInWithPopup(auth, provider); } catch (e) { window.showToast('로그인 실패'); } };
        window.logout = async () => { try { await signOut(auth); window.showToast('로그아웃 완료'); } catch (e) {} };

        window.updateCalendarIframe = () => {
            const iframe = document.getElementById('calendar-iframe-month');
            if (iframe) {
                const baseSrc = `src=${encodeURIComponent(calendarId)}&ctz=Asia%2FSeoul&bgcolor=%23ffffff`;
                iframe.src = `https://calendar.google.com/calendar/embed?${baseSrc}&showTitle=0&showNav=1&showPrint=0&showTabs=1&showCalendars=0&showTz=0&mode=MONTH&wkst=1`;
            }
        };

        window.fetchExchangeRate = async () => {
            try {
                const res = await fetch('https://api.manana.kr/exchange/rate.json'), data = await res.json(), usd = data.find(d => d.name === 'USDKRW=X');
                if (usd) {
                    const sendRate = usd.rate + 9.8, disp = document.getElementById('exchange-rate-display');
                    if (disp) disp.innerHTML = `<a href="https://finance.naver.com/marketindex/exchangeDetail.naver?marketindexCd=FX_USDKRW" target="_blank" class="text-xs font-bold text-gray-700 bg-green-50 px-3 py-1.5 rounded-lg border border-green-200 shadow-sm">1 USD = <span class="text-red-500">${sendRate.toLocaleString('ko-KR', {minimumFractionDigits: 2})}</span> 원</a>`;
                    const input = document.getElementById('calc-rate-input');
                    if (input) { input.value = sendRate.toFixed(2); window.calculateTotal(); }
                }
            } catch (e) {}
        };

        // --- Core Business Logics ---
        window.calculateTotal = () => {
            const p = parseFloat(document.getElementById('calc-price')?.value) || 0, s = parseFloat(document.getElementById('calc-shipping')?.value) || 0, r = parseFloat(document.getElementById('calc-rate-input')?.value) || 0;
            const totalUSD = (p + s) * 1.08, totalKRW = totalUSD * r;
            const usdD = document.getElementById('calc-total-usd'), krwD = document.getElementById('calc-total-display');
            if (usdD) usdD.innerText = '$ ' + totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            if (krwD) krwD.innerText = Math.round(totalKRW).toLocaleString('ko-KR') + ' 원';
            window.calculateFedEx();
        };

        window.calculateFedEx = () => {

            const hLow = Math.floor(hIn / 160) || 1, hHigh = Math.ceil(hIn / 160) || 1;
            
            const combinations = [
                { w: wLow, h: hLow },
                { w: wLow, h: hHigh },
                { w: wHigh, h: hLow },
                { w: wHigh, h: hHigh }

            combinations.forEach((rec, idx) => {
                const rw = rec.w * 320, rh = rec.h * 160;
                const totalModules = rec.w * rec.h;
                const sizeEl = document.getElementById(`led-rec${idx+1}-size`);
                const countEl = document.getElementById(`led-rec${idx+1}-count`);
                const inchEl = document.getElementById(`led-rec${idx+1}-inch`);

        window.renderMySites = () => {
            const container = document.getElementById('my-sites-container'); if (!container) return;
            container.innerHTML = mySites.map((s, idx) => `<div class="my-site-item shrink-0" draggable="true" ondragstart="window.handleMyDragStart(event, ${idx})" ondragover="event.preventDefault()" ondrop="window.handleMyDrop(event, ${idx})"><a href="${s.url}" target="_blank" class="w-8 h-8 bg-white rounded-full border border-gray-200 flex items-center justify-center hover:shadow-md transition-shadow"><img src="https://www.google.com/s2/favicons?sz=64&domain=${s.url}" class="w-5 h-5 pointer-events-none"></a></div>`).join('');
        };
        window.renderMySitesList = () => {
            const list = document.getElementById('my-sites-list'); if (!list) return;
            list.innerHTML = mySites.map((s, idx) => `<div class="flex items-center justify-between bg-white border border-gray-100 p-2.5 rounded-lg shadow-sm" draggable="true" ondragstart="window.handleMyDragStart(event, ${idx})" ondragover="event.preventDefault()" ondrop="window.handleMyDrop(event, ${idx})"><div class="flex items-center gap-3"><img src="https://www.google.com/s2/favicons?sz=64&domain=${s.url}" class="w-4 h-4 pointer-events-none"><span class="text-sm font-bold text-gray-700">${s.name}</span></div><button onclick="window.deleteSite('${s.id}', true)" class="text-red-400 hover:text-red-600 p-1"><i class="fas fa-trash-alt text-xs"></i></button></div>`).join('');
        };
        window.render = () => {
            const m = document.getElementById('dashboard'); m.innerHTML = ''; if (!categories.length) return;
            categories.forEach(cat => {
                const sec = document.createElement('div'); sec.className = 'category-section bg-white border border-gray-200 border-b-[4px] border-b-gray-300 shadow-md px-5 py-2.5 rounded-2xl flex flex-col h-full';
                const cs = sites.filter(s => s.category === cat).sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0));
                const sh = cs.map(site => `<div class="site-card relative flex flex-col items-center group p-1 transition-all"><button onclick="window.deleteSite('${site.id}')" class="delete-btn opacity-0 absolute -top-0.5 right-0.5 bg-red-500 text-white w-3.5 h-3.5 rounded-full text-[7px] flex items-center justify-center z-10"><i class="fas fa-times"></i></button><a href="${site.url}" target="_blank" class="flex flex-col items-center text-center w-full"><div class="w-8 h-8 bg-white rounded-full flex items-center justify-center border border-gray-100 mb-1 overflow-hidden p-1 shadow-sm transition-transform group-hover:scale-105"><img src="https://www.google.com/s2/favicons?sz=64&domain=${site.url}" class="w-full h-full object-contain" onerror="this.src='https://www.google.com/favicon.ico'"></div><span class="text-[10px] font-medium text-gray-700 truncate w-full px-0.5 leading-tight">${site.name}</span></a></div>`).join('');
                sec.innerHTML = `<div class="flex items-center mb-0 group"><h2 class="text-xs font-bold text-gray-700 border-l-[2px] border-blue-500 pl-1.5 flex items-center gap-1 mr-2"><i class="fas fa-folder text-blue-400"></i> ${cat}</h2></div><div class="grid grid-cols-5 sm:grid-cols-7 md:grid-cols-9 lg:grid-cols-11 gap-0.5 items-start min-h-[45px]">${sh}<div class="flex flex-col items-center group cursor-pointer p-1" onclick="window.openQuickAddModal('${cat}')"><div class="w-8 h-8 rounded-full flex items-center justify-center border border-dashed border-gray-300 mb-1 hover:border-blue-500 hover:bg-blue-50 transition-all"><i class="fas fa-plus text-gray-300 group-hover:text-blue-500 text-[10px]"></i></div></div></div>`;
                m.appendChild(sec);
            });
        };
        window.renderTodos = () => {
            const l = document.getElementById('todoList'); if (!l) return;
            document.getElementById('todo-count').innerText = `${todos.filter(t => t.done).length}/${todos.length}`;
            l.innerHTML = todos.length === 0 ? '<li class="text-xs text-gray-400 text-center py-4">할일 없음</li>' : todos.map(t => `<li class="flex items-start justify-between group p-1.5 hover:bg-gray-50 rounded-lg transition-colors border border-transparent"><div class="flex items-start gap-2 cursor-pointer flex-1" onclick="window.toggleTodo('${t.id}', ${t.done})"><div class="w-3.5 h-3.5 mt-0.5 rounded border flex items-center justify-center ${t.done ? 'bg-blue-500 border-blue-500 text-white' : 'border-gray-300 text-transparent'}"><i class="fas fa-check text-[7px]"></i></div><span class="text-[11px] ${t.done ? 'text-gray-400 line-through' : 'text-gray-700'} flex-1 leading-tight">${t.text}</span></div><button onclick="window.deleteTodo('${t.id}')" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 p-1"><i class="fas fa-times text-[9px]"></i></button></li>`).join('');
        };
        window.handleMyDragStart = (e, idx) => { if (!window.requireAuth()) { e.preventDefault(); return; } dragMyIdx = idx; e.target.classList.add('opacity-40'); e.dataTransfer.setData('application/mysite', 'true'); };
        window.handleMyDrop = async (e, dropIdx) => {
            e.preventDefault(); if (!e.dataTransfer.types.includes('application/mysite')) return;
            if (dragMyIdx !== dropIdx && dragMyIdx !== -1 && currentUser) {
                const moved = mySites.splice(dragMyIdx, 1)[0]; mySites.splice(dropIdx, 0, moved);
                const batch = mySites.map((s, i) => updateDoc(doc(db, ...getUserRoot(currentUser.uid).split('/').filter(Boolean), 'mySites', s.id), { createdAt: Date.now() + i }));
                await Promise.all(batch);
            }
        };

        // --- Final Execution ---
        document.getElementById('addTodoBtn').onclick = window.addTodo;
        document.getElementById('todoInput').onkeypress = (e) => { if (e.key === 'Enter') window.addTodo(); };
        document.getElementById('submitSiteBtn').onclick = window.submitSite;
        document.getElementById('saveCalendarSettingsBtn').onclick = window.saveCalendarSettings;
        
        // Initial Fetch
        window.fetchExchangeRate(); 
        setInterval(window.fetchExchangeRate, 60000);
        window.updateCalendarIframe();
    </script>
</body>
</html>
