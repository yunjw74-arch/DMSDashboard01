<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Dashboard (AI Enhanced)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-ac.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; position: relative; min-height: 100vh; overflow-x: hidden; }
        .site-card:hover .delete-btn { opacity: 1; }
        .my-site-item:hover .my-delete-btn { opacity: 1; }
        .category-header:hover .edit-tools { opacity: 1; }
        .font-nanum-ac { font-family: 'NanumSquareAc', sans-serif; }
        .category-section { transition: all 0.2s ease; }
        .site-card { transition: transform 0.2s, background-color 0.2s; z-index: 1; }
        .site-card:hover { z-index: 50; } 
        .delete-btn, .my-delete-btn { transition: opacity 0.2s; pointer-events: auto; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Sticky Note Styles */
        .sticky-note {
            position: fixed;
            box-shadow: 3px 3px 12px rgba(0,0,0,0.18);
            border-radius: 4px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.08);
            resize: both;
            min-width: 150px;
            min-height: 150px;
            background-color: #fff9c4;
        }
        /* 드래그 중 텍스트 선택 방지용 클래스 */
        .dragging-active {
            user-select: none !important;
            cursor: move !important;
        }
        .sticky-note-header {
            cursor: move;
            height: 30px;
            background: rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            flex-shrink: 0;
        }
        .sticky-note-body {
            flex: 1;
            padding: 12px;
            font-family: 'NanumSquareAc', sans-serif;
            font-size: 14px;
            border: none;
            background: transparent;
            resize: none;
            outline: none;
            line-height: 1.6;
            width: 100%;
        }
        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 2px rgba(0,0,0,0.2);
            transition: transform 0.15s;
        }
        .color-dot:hover { transform: scale(1.3); }
        .note-date {
            font-size: 10px;
            font-weight: 800;
            color: rgba(0,0,0,0.4);
            margin-right: auto;
            margin-left: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body class="px-4 md:px-10 pb-20 font-nanum-ac text-black">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAI9RHb4fuk8RmvlhcRtQjqzm_wKbG42k",
            authDomain: "webdashboard-d9db7.firebaseapp.com",
            projectId: "webdashboard-d9db7",
            storageBucket: "webdashboard-d9db7.firebasestorage.app",
            messagingSenderId: "536804719990",
            appId: "1:536804719990:web:7317ae2e35be87addd0e57"
        };
        const appId = 'webdashboard';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let sites = []; let categories = []; let mySites = [];
        let calendarId = "ko.south_korea#holiday@group.v.calendar.google.com";
        let todos = []; let stickyNotes = []; let currentUser = null; let currentEditTodoIndex = -1; let unsubs = [];

        const getUserRoot = (uid) => `artifacts/${appId}/users/${uid}`;
        const getMySitesCol = (uid) => collection(db, getUserRoot(uid), 'mySites');
        const getSitesCol = (uid) => collection(db, getUserRoot(uid), 'sites');
        const getTodosCol = (uid) => collection(db, getUserRoot(uid), 'todos');
        const getStickyCol = (uid) => collection(db, getUserRoot(uid), 'stickyNotes');
        const getConfigDoc = (uid) => doc(db, getUserRoot(uid), 'config', 'settings');

        // --- Core Utils ---
        window.updateCalendarIframe = () => {
            const iframe = document.getElementById('calendar-iframe-month');
            if (iframe) {
                const baseSrc = `src=${encodeURIComponent(calendarId)}&ctz=Asia%2FSeoul&bgcolor=%23ffffff`;
                iframe.src = `https://calendar.google.com/calendar/embed?${baseSrc}&showTitle=0&showNav=1&showPrint=0&showTabs=1&showCalendars=0&showTz=0&mode=MONTH&wkst=1`;
            }
        };

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('opacity-100'), 10);
            setTimeout(() => { toast.classList.remove('opacity-100'); setTimeout(() => toast.classList.add('hidden'), 300); }, 2000);
        };

        const requireAuth = () => { if (!currentUser) { showToast('로그인이 필요한 기능입니다.'); return false; } return true; };

        // --- Sticky Notes (Fixed Position & Drag Fix) ---
        let activeDragId = null;
        let dragStartPos = { x: 0, y: 0 };
        let noteStartPos = { x: 0, y: 0 };

        window.initStickyDrag = (e, id) => {
            if (e.target.closest('.color-dot') || e.target.closest('button')) return;
            e.preventDefault(); 
            activeDragId = id;
            const noteEl = document.getElementById(`note-${id}`);
            
            // 텍스트 선택 방지용 클래스 추가
            document.body.classList.add('dragging-active');
            
            dragStartPos.x = e.clientX;
            dragStartPos.y = e.clientY;
            noteStartPos.x = parseFloat(noteEl.style.left);
            noteStartPos.y = parseFloat(noteEl.style.top);
            
            document.addEventListener('mousemove', handleStickyMouseMove);
            document.addEventListener('mouseup', handleStickyMouseUp);
        };

        function handleStickyMouseMove(e) {
            if (!activeDragId) return;
            const noteEl = document.getElementById(`note-${activeDragId}`);
            noteEl.style.left = `${noteStartPos.x + (e.clientX - dragStartPos.x)}px`;
            noteEl.style.top = `${noteStartPos.y + (e.clientY - dragStartPos.y)}px`;
        }

        async function handleStickyMouseUp() {
            if (!activeDragId) return;
            document.body.classList.remove('dragging-active');
            const noteEl = document.getElementById(`note-${activeDragId}`);
            const fx = parseFloat(noteEl.style.left);
            const fy = parseFloat(noteEl.style.top);
            const id = activeDragId;
            activeDragId = null;
            document.removeEventListener('mousemove', handleStickyMouseMove);
            document.removeEventListener('mouseup', handleStickyMouseUp);
            await updateDoc(doc(getStickyCol(currentUser.uid), id), { x: fx, y: fy });
        }

        // --- MY Sites Drag & Drop ---
        let dragMyIdx = -1;
        window.handleMyDragStart = (e, idx) => {
            if (!requireAuth()) { e.preventDefault(); return; }
            dragMyIdx = idx;
            e.target.classList.add('opacity-40');
            e.dataTransfer.setData('application/mysite', 'true');
        };

        window.handleMyDrop = async (e, dropIdx) => {
            e.preventDefault();
            if (!e.dataTransfer.types.includes('application/mysite')) return;
            if (dragMyIdx !== dropIdx && dragMyIdx !== -1 && currentUser) {
                const moved = mySites.splice(dragMyIdx, 1)[0];
                mySites.splice(dropIdx, 0, moved);
                // 모든 아이콘의 order 값을 현재 배열 순서대로 일괄 업데이트
                const batchPromises = mySites.map((site, index) => 
                    updateDoc(doc(getMySitesCol(currentUser.uid), site.id), { createdAt: Date.now() + index }) // 간단히 순서 유지를 위해 시간값을 순차 조정
                );
                await Promise.all(batchPromises);
            }
        };

        // --- Business Logic ---
        window.calculateTotal = () => {
            const p = parseFloat(document.getElementById('calc-price').value) || 0;
            const s = parseFloat(document.getElementById('calc-shipping').value) || 0;
            const r = parseFloat(document.getElementById('calc-rate-input').value) || 0;
            const totalUSD = (p + s) * 1.08;
            const totalKRW = totalUSD * r;
            document.getElementById('calc-total-usd').innerText = '$ ' + totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('calc-total-display').innerText = Math.round(totalKRW).toLocaleString('ko-KR') + ' 원';
            window.calculateFedEx();
        };

        window.calculateFedEx = () => {
            const L = parseFloat(document.getElementById('fedex-l').value) || 0;
            const W = parseFloat(document.getElementById('fedex-w').value) || 0;
            const H = parseFloat(document.getElementById('fedex-h').value) || 0;
            const actualWt = parseFloat(document.getElementById('fedex-weight').value) || 0;
            const dimWt = (L * W * H) / 5000;
            const chargeWt = Math.max(dimWt, actualWt);
            const rate = parseFloat(document.getElementById('calc-rate-input').value) || 1400;
            const totalUSD = chargeWt * 12.5 * 1.28;
            document.getElementById('fedex-dim-wt-display').innerText = dimWt.toFixed(2) + ' kg';
            document.getElementById('fedex-charge-wt').innerText = chargeWt.toFixed(2) + ' kg';
            document.getElementById('fedex-usd').innerText = '$ ' + totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('fedex-krw').innerText = '≈ ' + Math.round(totalUSD * rate).toLocaleString('ko-KR') + ' 원';
        };

        // --- Core UI Management ---
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user && !user.isAnonymous) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('user-profile-area').classList.remove('hidden');
                document.getElementById('user-display-name').innerText = user.displayName || user.email.split('@')[0];
                if (user.photoURL) { const img = document.getElementById('user-avatar'); img.src = user.photoURL; img.classList.remove('hidden'); }
                startListeners(user.uid);
            } else {
                document.getElementById('login-btn').classList.remove('hidden');
                document.getElementById('user-profile-area').classList.add('hidden');
                unsubs.forEach(u => u()); unsubs = [];
                categories = []; sites = []; mySites = []; stickyNotes = []; render(); renderStickyNotes(); renderTodos(); window.updateCalendarIframe();
            }
        });

        function startListeners(uid) {
            unsubs.forEach(u => u()); unsubs = [];
            unsubs.push(onSnapshot(getConfigDoc(uid), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.categories) categories = data.categories;
                    if (data.calendarId) { calendarId = data.calendarId; window.updateCalendarIframe(); }
                    render();
                } else {
                    setDoc(getConfigDoc(uid), { categories: ['메인', '업무'], calendarId: "ko.south_korea#holiday@group.v.calendar.google.com" });
                }
            }));
            unsubs.push(onSnapshot(getSitesCol(uid), (snap) => { sites = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); render(); }));
            unsubs.push(onSnapshot(getMySitesCol(uid), (snap) => { 
                mySites = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); 
                mySites.sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0)); // 순서 유지
                renderMySites(); 
            }));
            unsubs.push(onSnapshot(getTodosCol(uid), (snap) => { todos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); todos.sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0)); renderTodos(); }));
            unsubs.push(onSnapshot(getStickyCol(uid), (snap) => { stickyNotes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); renderStickyNotes(); }));
        }

        function renderMySites() {
            const container = document.getElementById('my-sites-container');
            if (!container) return;
            const html = mySites.map((s, idx) => `
                <div class="my-site-item relative group shrink-0" 
                     draggable="true" 
                     ondragstart="window.handleMyDragStart(event, ${idx})"
                     ondragover="event.preventDefault()"
                     ondrop="window.handleMyDrop(event, ${idx})">
                    <a href="${s.url}" target="_blank" title="${s.name}" class="w-8 h-8 bg-white rounded-full border border-gray-200 flex items-center justify-center hover:shadow-md transition-shadow">
                        <img src="https://www.google.com/s2/favicons?sz=64&domain=${s.url}" class="w-5 h-5 pointer-events-none">
                    </a>
                    <button onclick="window.deleteSite('${s.id}', true)" class="my-delete-btn opacity-0 absolute -top-1 -right-1 bg-red-500 text-white w-3.5 h-3.5 rounded-full text-[8px] flex items-center justify-center"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
            
            container.innerHTML = html + `
                <button onclick="window.openQuickAddModal('MY_SECTION')" class="w-8 h-8 rounded-full border border-dashed border-gray-300 flex items-center justify-center text-gray-400 hover:border-blue-500 hover:text-blue-500 transition-all">
                    <i class="fas fa-plus text-xs"></i>
                </button>`;
        }

        function renderStickyNotes() {
            const container = document.getElementById('sticky-notes-container');
            container.innerHTML = '';
            const noteColors = ['#fff9c4', '#ffecb3', '#f8bbd0', '#e1f5fe', '#f1f8e9'];
            stickyNotes.forEach(note => {
                const el = document.createElement('div');
                el.id = `note-${note.id}`;
                el.className = 'sticky-note pointer-events-auto';
                el.style.left = `${note.x}px`; el.style.top = `${note.y}px`;
                el.style.width = `${note.width || 220}px`; el.style.height = `${note.height || 220}px`;
                el.style.backgroundColor = note.color || '#fff9c4';
                const d = new Date(note.createdAt);
                el.innerHTML = `
                    <div class="sticky-note-header" onmousedown="window.initStickyDrag(event, '${note.id}')">
                        <div class="flex gap-1.5">${noteColors.map(c => `<div class="color-dot" style="background:${c}" onclick="window.updateStickyNote('${note.id}', {color: '${c}'})"></div>`).join('')}</div>
                        <span class="note-date">${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}</span>
                        <button onclick="window.deleteStickyNote('${note.id}')" class="text-gray-500 hover:text-red-500"><i class="fas fa-times text-xs"></i></button>
                    </div>
                    <textarea class="sticky-note-body">${note.text || ''}</textarea>`;
                const ta = el.querySelector('textarea');
                ta.onblur = () => { if (ta.value !== note.text) window.updateStickyNote(note.id, { text: ta.value }); };
                el.onmouseup = () => { if (!activeDragId) { const nw = el.offsetWidth, nh = el.offsetHeight; if (Math.abs(nw - (note.width||220)) > 5 || Math.abs(nh - (note.height||220)) > 5) window.updateStickyNote(note.id, {width:nw, height:nh}); } };
                container.appendChild(el);
            });
        }

        function render() {
            const m = document.getElementById('dashboard');
            m.innerHTML = ''; if (!categories.length) return;
            categories.forEach((cat, i) => {
                const sec = document.createElement('div');
                sec.className = 'category-section bg-white border border-gray-200 border-b-[4px] border-b-gray-300 shadow-md px-5 py-2.5 rounded-2xl flex flex-col h-full';
                const cs = sites.filter(s => s.category === cat).sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0));
                const sh = cs.map(site => `<div class="site-card relative flex flex-col items-center group p-1 transition-all"><button onclick="window.deleteSite('${site.id}')" class="delete-btn opacity-0 absolute -top-0.5 right-0.5 bg-red-500 text-white w-3.5 h-3.5 rounded-full text-[7px] flex items-center justify-center z-10"><i class="fas fa-times"></i></button><a href="${site.url}" target="_blank" class="flex flex-col items-center text-center w-full"><div class="w-8 h-8 bg-white rounded-full flex items-center justify-center border border-gray-100 mb-1 overflow-hidden p-1 shadow-sm transition-transform group-hover:scale-105"><img src="https://www.google.com/s2/favicons?sz=64&domain=${site.url}" class="w-full h-full object-contain" onerror="this.src='https://www.google.com/favicon.ico'"></div><span class="text-[10px] font-medium text-gray-700 truncate w-full px-0.5 leading-tight">${site.name}</span></a></div>`).join('');
                sec.innerHTML = `<div class="flex items-center mb-0 group"><h2 class="text-xs font-bold text-gray-700 border-l-[2px] border-blue-500 pl-1.5 flex items-center gap-1 mr-2"><i class="fas fa-folder text-blue-400"></i> ${cat}</h2></div><div class="grid grid-cols-5 sm:grid-cols-7 md:grid-cols-9 lg:grid-cols-11 gap-0.5 items-start min-h-[45px]">${sh}<div class="flex flex-col items-center group cursor-pointer p-1" onclick="window.openQuickAddModal('${cat}')"><div class="w-8 h-8 rounded-full flex items-center justify-center border border-dashed border-gray-300 mb-1 hover:border-blue-500 hover:bg-blue-50 transition-all"><i class="fas fa-plus text-gray-300 group-hover:text-blue-500 text-[10px]"></i></div></div></div>`;
                m.appendChild(sec);
            });
        }

        // --- Globals ---
        window.addStickyNote = async () => { if (!requireAuth()) return; await setDoc(doc(getStickyCol(currentUser.uid)), { text: '', x: 150, y: 150, width: 220, height: 220, color: '#fff9c4', createdAt: Date.now() }); };
        window.deleteStickyNote = async (id) => { if (!requireAuth()) return; await deleteDoc(doc(getStickyCol(currentUser.uid), id)); };
        window.updateStickyNote = async (id, data) => { if (!requireAuth()) return; await updateDoc(doc(getStickyCol(currentUser.uid), id), data); };
        window.openQuickAddModal = (cat) => { if (!requireAuth()) return; document.getElementById('modalCategory').value = cat; document.getElementById('modalTitle').innerText = (cat === 'MY_SECTION') ? '나만의 퀵 메뉴 추가' : `'${cat}' 사이트 추가`; document.getElementById('siteName').value = ""; document.getElementById('siteUrl').value = ""; document.getElementById('siteModal').classList.remove('hidden'); };
        window.closeModal = () => document.getElementById('siteModal').classList.add('hidden');
        window.submitSite = async () => { if (!requireAuth()) return; const n = document.getElementById('siteName').value.trim(); let u = document.getElementById('siteUrl').value.trim(); const cat = document.getElementById('modalCategory').value; if (!n || !u) return; if (!u.startsWith('http')) u = 'https://' + u; if (cat === 'MY_SECTION') { await setDoc(doc(getMySitesCol(currentUser.uid)), { name: n, url: u, createdAt: Date.now() }); } else { await setDoc(doc(getSitesCol(currentUser.uid)), { name: n, url: u, category: cat, createdAt: Date.now() }); } closeModal(); };
        window.deleteSite = async (id, isMy = false) => { if (!requireAuth()) return; if (confirm('삭제하시겠습니까?')) { const col = isMy ? getMySitesCol(currentUser.uid) : getSitesCol(currentUser.uid); await deleteDoc(doc(col, id)); } };
        window.addCategory = async () => { if (!requireAuth()) return; const n = prompt('새 카테고리 이름:'); if (n) { categories.push(n.trim()); await setDoc(getConfigDoc(currentUser.uid), { categories }, { merge: true }); } };
        window.openCalendarSettings = () => { if (!requireAuth()) return; document.getElementById('calendarSrcInput').value = calendarId; document.getElementById('calendarModal').classList.remove('hidden'); };
        window.closeCalendarModal = () => document.getElementById('calendarModal').classList.add('hidden');
        window.saveCalendarSettings = async () => { const v = document.getElementById('calendarSrcInput').value.trim(); if (v) { await setDoc(getConfigDoc(currentUser.uid), { calendarId: v }, { merge: true }); window.closeCalendarModal(); showToast('저장완료'); } };
        window.loginWithGoogle = async () => { try { await signInWithPopup(auth, provider); } catch (e) { showToast('로그인 실패'); } };
        window.logout = async () => { try { await signOut(auth); showToast('로그아웃 완료'); } catch (e) {} };
        window.addTodo = async () => { const i = document.getElementById('todoInput'); if (i.value.trim()) { const d = new Date(), p = `[${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}] `; await setDoc(doc(getTodosCol(currentUser.uid)), { text: p + i.value.trim(), done: false, createdAt: Date.now() }); i.value = ''; } };
        window.toggleTodo = async (id, d) => await updateDoc(doc(getTodosCol(currentUser.uid), id), { done: !d });
        window.deleteTodo = async (id) => await deleteDoc(doc(getTodosCol(currentUser.uid), id));
        function renderTodos() {
            const l = document.getElementById('todoList'); if (!l) return;
            document.getElementById('todo-count').innerText = `${todos.filter(t => t.done).length}/${todos.length}`;
            l.innerHTML = todos.length === 0 ? '<li class="text-xs text-gray-400 text-center py-4">할일 없음</li>' : todos.map(t => `<li class="flex items-start justify-between group p-1.5 hover:bg-gray-50 rounded-lg"><div class="flex items-start gap-2 cursor-pointer flex-1" onclick="window.toggleTodo('${t.id}', ${t.done})"><div class="w-3.5 h-3.5 mt-0.5 rounded border flex items-center justify-center ${t.done ? 'bg-blue-500 border-blue-500 text-white' : 'border-gray-300 text-transparent'}"><i class="fas fa-check text-[7px]"></i></div><span class="text-[11px] ${t.done ? 'text-gray-400 line-through' : 'text-gray-700'} flex-1">${t.text}</span></div><button onclick="window.deleteTodo('${t.id}')" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 p-1"><i class="fas fa-times text-[9px]"></i></button></li>`).join('');
        }

        document.getElementById('addTodoBtn').onclick = window.addTodo;
        document.getElementById('todoInput').onkeypress = (e) => { if (e.key === 'Enter') window.addTodo(); };
        document.getElementById('submitSiteBtn').onclick = window.submitSite;
        document.getElementById('saveCalendarSettingsBtn').onclick = window.saveCalendarSettings;

        window.fetchExchangeRate = async () => {
            try {
                const res = await fetch('https://api.manana.kr/exchange/rate.json');
                const data = await res.json();
                const usd = data.find(d => d.name === 'USDKRW=X');
                if (usd) {
                    const sendRate = usd.rate + 9.8;
                    document.getElementById('exchange-rate-display').innerHTML = `<a href="https://finance.naver.com/marketindex/exchangeDetail.naver?marketindexCd=FX_USDKRW" target="_blank" class="text-xs font-bold text-gray-700 bg-green-50 px-3 py-1.5 rounded-lg border border-green-200">1 USD = <span class="text-red-500">${sendRate.toLocaleString('ko-KR', {minimumFractionDigits: 2})}</span> 원</a>`;
                    const input = document.getElementById('calc-rate-input');
                    if (input) { input.value = sendRate.toFixed(2); window.calculateTotal(); }
                }
            } catch (e) {}
        };
        window.fetchExchangeRate(); setInterval(window.fetchExchangeRate, 60000);
    </script>
</body>
</html>
